databaseChangeLog:
  - changeSet:
      id: 008-create-table-user-note
      author: veillehub
      comment: Création de la table USER_NOTE (notes personnelles d'un utilisateur sur un article)
      changes:
        - createTable:
            tableName: user_note
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_user_note
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: article_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: contenu_note
                  type: text
              - column:
                  name: "timestamp"
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: user_note
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_note_user
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: user_note
            baseColumnNames: article_id
            referencedTableName: article
            referencedColumnNames: id
            constraintName: fk_user_note_article
            onDelete: CASCADE
        - createIndex:
            indexName: idx_user_note_user_id
            tableName: user_note
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_user_note_article_id
            tableName: user_note
            columns:
              - column:
                  name: article_id
