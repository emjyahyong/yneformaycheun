databaseChangeLog:
  - changeSet:
      id: 003-create-table-source
      author: veillehub
      comment: Création de la table SOURCE (flux RSS suivis par un utilisateur)
      changes:
        - createTable:
            tableName: source
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_source
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: url_rss
                  type: varchar(2048)
                  constraints:
                    nullable: false
              - column:
                  name: titre
                  type: varchar(255)
              - column:
                  name: description
                  type: text
              - column:
                  name: date_dernier_fetch
                  type: timestamp with time zone
              - column:
                  name: statut_fetch
                  type: varchar(20)
        - addForeignKeyConstraint:
            baseTableName: source
            baseColumnNames: user_id
            referencedTableName: "user"
            referencedColumnNames: id
            constraintName: fk_source_user
            onDelete: CASCADE
        - createIndex:
            indexName: idx_source_user_id
            tableName: source
            columns:
              - column:
                  name: user_id
