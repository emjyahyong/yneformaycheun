databaseChangeLog:
  - changeSet:
      id: 002-create-table-user
      author: veillehub
      comment: Création de la table USER (comptes utilisateurs)
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_user
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_user_email
              - column:
                  name: username
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: date_creation
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
