databaseChangeLog:
  - changeSet:
      id: 007-create-table-article-tag
      author: veillehub
      comment: Création de la table de jonction ARTICLE_TAG (association N:N entre ARTICLE et TAG)
      changes:
        - createTable:
            tableName: article_tag
            columns:
              - column:
                  name: article_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: tag_id
                  type: bigint
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: article_tag
            columnNames: article_id, tag_id
            constraintName: pk_article_tag
        - addForeignKeyConstraint:
            baseTableName: article_tag
            baseColumnNames: article_id
            referencedTableName: article
            referencedColumnNames: id
            constraintName: fk_article_tag_article
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: article_tag
            baseColumnNames: tag_id
            referencedTableName: tag
            referencedColumnNames: id
            constraintName: fk_article_tag_tag
            onDelete: CASCADE
        - createIndex:
            indexName: idx_article_tag_article_id
            tableName: article_tag
            columns:
              - column:
                  name: article_id
        - createIndex:
            indexName: idx_article_tag_tag_id
            tableName: article_tag
            columns:
              - column:
                  name: tag_id
