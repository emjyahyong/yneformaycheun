spring.application.name=yneformaycheun
server.port=8080

# --- Base de données ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/yneformaycheun}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:UserTest}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:aaa}

# Le schéma est géré par Liquibase : Hibernate ne fait que le valider.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.open-in-view=false

# --- Liquibase ---
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# --- Sécurité / JWT ---
# En production, APP_JWT_SECRET est injecté via une variable d'environnement.
# La valeur par défaut (dev uniquement) doit faire au moins 32 octets (HS256).
app.jwt.secret=${APP_JWT_SECRET:dev-secret-yneformaycheun-change-me-please-32bytes+}

# --- CORS (origine du frontend) ---
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# --- Fetch planifié (cron Spring : toutes les heures) ---
app.fetch.cron=0 0 * * * *

# --- Supervision (Actuator) ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=Yneformaycheun
info.app.description=API REST d'agrégation de flux RSS technologiques
