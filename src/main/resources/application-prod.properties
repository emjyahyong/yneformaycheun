# Profil production : les secrets et identifiants proviennent exclusivement de
# variables d'environnement, jamais du dépôt.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/yneformaycheun}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Le schéma est géré par Liquibase, jamais par Hibernate en production.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.show_sql=false

app.jwt.secret=${APP_JWT_SECRET}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# Supervision minimale exposée publiquement.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
