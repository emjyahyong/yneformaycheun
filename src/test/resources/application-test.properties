# Configuration de test. La base PostgreSQL est fournie par TestContainers
# (voir AbstractIntegrationTest, @ServiceConnection) : aucune URL de datasource
# n'est codée en dur ici.

# JPA / Hibernate — le schéma est posé par Liquibase, Hibernate le valide.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Secret JWT de test (fixe, hors production).
app.jwt.secret=test-secret-yneformaycheun-0123456789-abcdef

# CORS
app.cors.allowed-origins=http://localhost:5173

# Fetch planifié désactivé pendant les tests ("-" = cron désactivé par Spring).
app.fetch.cron=-

spring.application.name=yneformaycheun
server.port=0
