server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression des assets textuels.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA : toute route inconnue retombe sur index.html (routage React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets versionnés (hash dans le nom de fichier).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Reverse proxy vers l'API Spring Boot (même origine => pas de CORS).
    location /api/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Documentation OpenAPI / Swagger UI, exposées via le proxy.
    location /swagger-ui/ { proxy_pass http://app:8080; }
    location /v3/api-docs { proxy_pass http://app:8080; }

    # Health check applicatif.
    location /actuator/ { proxy_pass http://app:8080; }
}
